name: CI

on:
  push:
    branches: [main, master]
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  # Run Clarity smart contract unit tests via Clarinet SDK + Vitest
  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run contract tests
        run: npm test

  # Cross-platform SDK compatibility matrix
  # Tests that rivus-sdk installs correctly on all supported OS and Node combinations
  install-sdks:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: ['18', '20', '22', '24', '26']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # Install root project deps (Clarinet SDK, vitest, etc.)
      - name: Install project dependencies
        run: npm ci

      # Verify rivus-sdk is installable and publishable across platforms
      - name: Install rivus-sdk from npmjs.com
        run: npm install --no-audit --no-fund --ignore-scripts rivus-sdk
